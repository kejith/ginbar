# docker-compose.yml — ginbar production stack
# Spin up: docker compose up -d
# First run:  docker compose run --rm migrate

services:
  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ginbar}
      POSTGRES_USER: ${POSTGRES_USER:-ginbar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ginbar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go / Fiber backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    environment:
      DB_URL: postgres://${POSTGRES_USER:-ginbar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ginbar}?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?required}
    volumes:
      # Shared media volume — backend writes, nginx reads
      - media:/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/check/me || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── nginx: SPA + media + API proxy ───────────────────────────────────────
  nginx:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read media files written by backend
      - media:/var/www/media:ro
      # Cloudflare Origin Certificate (place origin.crt + origin.key here)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy

  # ── goose migrations (run once: docker compose run --rm migrate) ──────────
  migrate:
    build:
      context: .
      target: backend
    environment:
      DB_URL: postgres://${POSTGRES_USER:-ginbar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ginbar}?sslmode=disable
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /app/goose -dir /app/db/migrations postgres "$$DB_URL" up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate

volumes:
  pgdata:
  media:
