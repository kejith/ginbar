# docker-compose.yml — wallium production stack
# Spin up: docker compose up -d
# First run:  docker compose run --rm migrate
#
# On a real server the host nginx serves the frontend SPA and all static media
# (images, videos) directly from the filesystem.  Docker only handles the
# database (postgres), cache (redis) and the Go/Fiber backend API.
#
# Required .env variables:
#   POSTGRES_PASSWORD  – postgres password
#   SESSION_SECRET     – session signing key
#   MEDIA_DIR          – host path where the backend writes media
#                        (default: /opt/wallium/media)

services:
  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallium}
      POSTGRES_USER: ${POSTGRES_USER:-wallium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go / Fiber backend ────────────────────────────────────────────────────
  backend:
    image: wallium-backend
    build:
      context: .
      target: backend
    restart: unless-stopped
    environment:
      DB_URL: postgres://${POSTGRES_USER:-wallium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wallium}?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?required}
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/app.log
    volumes:
      # Bind-mount host media directory so the host nginx can serve files
      # directly without going through Docker.  MEDIA_DIR must be set in .env
      # (the install script writes it automatically).
      - ${MEDIA_DIR:-/opt/wallium/media}:/app/public
      # Bind-mount log directory so the host can run logrotate on it.
      # LOG_DIR defaults to /opt/wallium/logs; set in .env on the server.
      - ${LOG_DIR:-/opt/wallium/logs}:/app/logs
    ports:
      # Expose the API only on loopback so the host nginx can reach it.
      # Nothing else should talk to the backend directly.
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/check/me || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          # Go API is mostly I/O-bound; 2 cores is plenty.
          # The remaining cores are left for the worker and host nginx.
          cpus: "2.0"
          memory: 2G

  # ── Rust processing worker ───────────────────────────────────────────────
  worker:
    image: wallium-worker
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DB_URL: postgres://${POSTGRES_USER:-wallium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wallium}?sslmode=disable
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-6}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${MEDIA_DIR:-/opt/wallium/media}:/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 8-core / 62 GB server: 2 cores reserved for host nginx + OS.
          cpus: "${WORKER_CPUS:-6}"
          memory: ${WORKER_MEM:-48G}

  # ── goose migrations (run once: docker compose run --rm migrate) ──────────
  migrate:
    image: wallium-backend
    build:
      context: .
      target: backend
    environment:
      DB_URL: postgres://${POSTGRES_USER:-wallium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wallium}?sslmode=disable
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /app/goose -dir /app/db/migrations postgres "$$DB_URL" up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate

volumes:
  pgdata:
