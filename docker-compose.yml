version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    command: ["./ginbar"]
    env_file:
      - .env
    environment:
      DB_DRIVER: ${DB_DRIVER}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - images:/app/public/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "./ginbar", "-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: "ginbar"
      MYSQL_USER: "ginbar"
      MYSQL_PASSWORD: "test-password"
      MYSQL_ROOT_PASSWORD: "test-password"
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/mysql/schema:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest-password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
    driver: local
  images:
    driver: local
    driver_opts:
      type: none
      device: ${PWD}/backend/data/images
      o: bind