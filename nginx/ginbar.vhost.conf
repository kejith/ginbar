# Host nginx vhost for ginbar.kejith.de
#
# The host nginx serves the frontend SPA and all static media (images, videos)
# directly from the filesystem.  Only /api/ requests are proxied into Docker
# (backend container listening on 127.0.0.1:3001).
#
# Paths below are set by the install / update scripts via sed substitution:
#   /opt/ginbar/frontend  →  ${FRONTEND_DIR}
#   /opt/ginbar/media     →  ${MEDIA_DIR}
#   ginbar.kejith.de      →  ${DOMAIN}
#   /etc/nginx/certs/ginbar → ${CERT_DIR}
#
# Deploy:
#   sudo cp /opt/ginbar/nginx/ginbar.vhost.conf /etc/nginx/sites-available/ginbar
#   sudo ln -s /etc/nginx/sites-available/ginbar /etc/nginx/sites-enabled/ginbar
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert path (Cloudflare Origin Certificate):
#   sudo mkdir -p /etc/nginx/certs/ginbar
#   sudo cp /opt/ginbar/nginx/certs/origin.crt /etc/nginx/certs/ginbar/origin.crt
#   sudo cp /opt/ginbar/nginx/certs/origin.key /etc/nginx/certs/ginbar/origin.key
#   sudo chmod 600 /etc/nginx/certs/ginbar/origin.key

server {
    listen 80;
    server_name ginbar.kejith.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ginbar.kejith.de;

    ssl_certificate     /etc/nginx/certs/ginbar/origin.crt;
    ssl_certificate_key /etc/nginx/certs/ginbar/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Gzip for text assets — Vite already produces .br/.gz
    gzip            on;
    gzip_static     on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;

    # Frontend SPA root (populated by install/update scripts)
    root /opt/ginbar/frontend;

    # ── Static media: served directly from host filesystem ─────────────────
    # Much faster than proxying through a container — no Docker overhead.

    location /images/ {
        alias /opt/ginbar/media/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
    }

    location /videos/ {
        alias /opt/ginbar/media/videos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Range requests for video seeking
        add_header Accept-Ranges bytes;
        access_log off;
    }

    # ── API: proxied to the backend container ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_request_buffering off;
        client_max_body_size    50m;
    }

    # ── Immutable hashed assets from Vite build ────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback: all other routes served by index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}
