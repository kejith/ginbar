worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -- Tuning ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip for text assets — Vite already produces .br/.gz, nginx can use pre-compressed
    gzip            on;
    gzip_static     on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;

    # -- Logging format ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # -- Upstream ----------------------------------------------------------------
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # -- HTTP → HTTPS redirect --------------------------------------------------------
    server {
        listen 80;
        server_name ginbar.kejith.de;
        return 301 https://$host$request_uri;
    }

    # -- Server ------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name ginbar.kejith.de;

        ssl_certificate     /etc/nginx/certs/origin.crt;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        root /var/www/html;

        # -- Static media: served directly from shared volume --------------------
        # Much faster than proxying through Go — nginx just hands off the fd.

        location /images/ {
            alias /var/www/media/images/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        location /videos/ {
            alias /var/www/media/videos/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # Range requests for video seeking
            add_header Accept-Ranges bytes;
            access_log off;
        }

        # -- API: proxy to Go/Fiber backend -------------------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Increase timeouts for upload / image-processing requests
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Don't buffer large uploads — stream directly to backend
            proxy_request_buffering off;
            client_max_body_size    50m;
        }

        # -- SPA fallback: all other routes served by index.html ----------------
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # -- Immutable hashed assets from Vite build ----------------------------
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
