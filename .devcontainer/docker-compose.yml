version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - go-cache:/home/vscode/go
      - node-modules-cache:/workspace/src/frontend/node_modules
      - ~/.ssh/id_ed25519:/home/vscode/.ssh-host/id_ed25519
    command: sleep infinity
    environment:
      - GOPATH=/home/vscode/go
      - GOMODCACHE=/home/vscode/go/pkg/mod
    depends_on:
      - postgres
    network_mode: service:postgres # share network so localhost:5432 just works

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallium
      POSTGRES_USER: wallium
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
      - "5050:5050"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallium"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@wallium.local
      PGADMIN_DEFAULT_PASSWORD: devpassword
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN_PORT: 5050
    # Share postgres's network namespace so localhost:5050 is reachable from
    # the app container (which also shares that namespace via network_mode).
    network_mode: service:postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      # Pre-seed the wallium-dev server so it appears on first open.
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      # Password file — running as root so permissions are not an issue.
      - ./pgadmin/pgpass:/pgpass
    depends_on:
      - postgres

volumes:
  postgres-data:
  pgadmin-data:
  go-cache:
  node-modules-cache:
